
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration App</title>

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Student Registration Form</h2>

        <form id="studentForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="number" class="form-control" id="mobile" placeholder="Enter mobile number" required>
            </div>

            <div class="form-group">
                <label>Course</label>
                <select class="form-control" id="course">
                    <option>BCA</option>
                    <option>BBA</option>
                    <option>B.Tech</option>
                    <option>BE</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Register
            </button>

        </form>

        <div id="message" class="mt-3 text-success text-center"></div>

    </div>
</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
